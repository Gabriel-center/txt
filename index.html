<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #22222c;
            --border: #2e2e3a;
            --accent: #5b8def;
            --accent-dim: #3a5fa8;
            --green: #3ecf74;
            --green-dim: #2a8a4e;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --text-faint: #44445a;
            --danger: #ef5b5b;
            --radius: 10px;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'IBM Plex Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 24px;
        }

        h1 span { color: var(--accent); }

        /* ---- VIEWS ---- */
        #host-view, #chat-view { display: none; }

        /* ---- SETUP CARD ---- */
        .setup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
        }

        .setup-card-label {
            font-size: 0.7rem;
            font-family: var(--font-mono);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 12px;
        }

        #peer-id-display {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 6px;
            transition: background 0.15s;
            user-select: none;
            margin-bottom: 4px;
        }

        #peer-id-display:hover { background: var(--surface2); }

        .click-hint {
            font-size: 0.7rem;
            color: var(--text-faint);
            text-align: center;
            margin-bottom: 14px;
            font-family: var(--font-mono);
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 4px;
        }

        #qrcode canvas, #qrcode img {
            border-radius: 6px;
            padding: 8px;
            background: white;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            color: var(--text-faint);
            font-size: 0.75rem;
            font-family: var(--font-mono);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ---- INPUTS & BUTTONS ---- */
        input[type="text"], textarea, input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent);
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: var(--text-faint);
        }

        #connect-id-input {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            letter-spacing: 0.2em;
            text-align: center;
            text-transform: lowercase;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: #4a7de0; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-green {
            background: var(--green);
            color: #0a1a0f;
        }
        .btn-green:hover { background: #35b865; }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .btn-sm {
            width: auto;
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* ---- CHAT VIEW ---- */
        #chat-view {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 32px);
            max-height: 700px;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
        }

        .chat-header .peer-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ---- CHAT LOG ---- */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #chat-log::-webkit-scrollbar { width: 4px; }
        #chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ---- MESSAGE BUBBLES ---- */
        .msg {
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 1.05rem;
            line-height: 1.5;
            word-break: break-word;
            cursor: pointer;
            position: relative;
            transition: opacity 0.15s;
            user-select: none;
        }

        .msg.sent {
            align-self: flex-end;
            background: var(--accent-dim);
            color: white;
            border-bottom-right-radius: 3px;
        }

        .msg.received {
            align-self: flex-start;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 3px;
        }

        .msg.large-text {
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .msg.copying {
            opacity: 0.6;
        }

        .msg-label {
            font-size: 0.7rem;
            font-family: var(--font-mono);
            color: var(--text-faint);
            margin-bottom: 4px;
            padding-left: 4px;
        }

        .copy-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            opacity: 0;
            transition: all 0.2s;
            pointer-events: none;
            z-index: 1000;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---- LINK CARDS ---- */
        .link-card {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 6px;
            text-decoration: none;
            transition: border-color 0.15s;
        }

        .link-card:hover { border-color: rgba(255,255,255,0.25); }

        .link-card-main {
            flex: 1;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.88rem;
            font-family: var(--font-mono);
        }

        .link-card-main:hover { color: #7aaaf5; }

        .link-icon { font-size: 0.9rem; flex-shrink: 0; }

        .link-url {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-copy {
            padding: 8px 12px;
            border-left: 1px solid rgba(255,255,255,0.08);
            background: none;
            border-radius: 0;
            color: var(--text-faint);
            font-size: 0.85rem;
            width: auto;
            cursor: pointer;
            border-top: none;
            border-bottom: none;
            border-right: none;
            transition: color 0.15s, background 0.15s;
        }

        .link-copy:hover {
            color: var(--text);
            background: rgba(255,255,255,0.05);
            transform: none;
        }

        /* ---- FILE CARDS ---- */
        .file-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }

        .file-card.sent { align-self: flex-end; border-color: var(--accent-dim); }
        .file-card.received { align-self: flex-start; }

        .file-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon { font-size: 1.4rem; flex-shrink: 0; }

        .file-info { flex: 1; overflow: hidden; }

        .file-name {
            font-size: 0.88rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .file-meta {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .file-card-progress {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .file-progress-bar-wrap {
            width: 100%;
            height: 5px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .file-progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.15s ease;
        }

        .file-card.received .file-progress-bar-fill { background: var(--green); }

        .file-progress-label {
            font-size: 0.7rem;
            font-family: var(--font-mono);
            color: var(--text-faint);
            display: flex;
            justify-content: space-between;
        }

        .file-download-btn {
            background: var(--green);
            color: #0a1a0f;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            white-space: nowrap;
            transition: background 0.15s;
            display: none;
        }

        .file-download-btn:hover { background: #35b865; transform: none; }

        .file-sent-badge {
            font-size: 0.72rem;
            font-family: var(--font-mono);
            color: var(--accent);
            text-align: right;
            display: none;
        }

        /* ---- INPUT BAR ---- */
        .input-bar {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            margin-top: 8px;
        }

        #message-input {
            flex: 1;
            resize: none;
            height: 44px;
            max-height: 120px;
            padding: 11px 14px;
            overflow-y: auto;
        }

        #send-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .file-row {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            align-items: center;
        }

        #file-input {
            flex: 1;
            padding: 8px 10px;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        #file-input::file-selector-button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 8px;
        }

        #send-file-btn {
            width: auto;
            padding: 8px 16px;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        /* ---- SYSTEM MESSAGES ---- */
        .sys-msg {
            text-align: center;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--text-faint);
            padding: 4px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>P2P <span>//</span> Share</h1>

        <!-- Host View -->
        <div id="host-view">
            <div class="setup-card">
                <div class="setup-card-label">Your code</div>
                <div id="peer-id-display" title="Click to copy">······</div>
                <div class="click-hint">click to copy</div>
                <div id="qrcode"></div>
            </div>

            <div class="setup-card">
                <div class="setup-card-label">Connect to someone</div>
                <input type="text" id="connect-id-input" placeholder="enter their 5-letter code" maxlength="5" style="margin-bottom:10px;">
                <button class="btn-primary" id="connect-btn">Connect →</button>
            </div>
        </div>

        <!-- Chat & File View -->
        <div id="chat-view">
            <div class="chat-header">
                <span class="peer-name" id="connection-status">Connected</span>
                <div class="status-dot"></div>
            </div>

            <div id="chat-log"></div>

            <div class="input-bar">
                <textarea id="message-input" placeholder="Message..." rows="1"></textarea>
                <button class="btn-primary" id="send-btn">↑</button>
            </div>
            <div class="file-row">
                <input type="file" id="file-input">
                <button class="btn-green btn-sm" id="send-file-btn">Send File</button>
            </div>
        </div>
    </div>

    <div class="copy-toast" id="copy-toast">Copied!</div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script>
        // DOM refs
        const hostView = document.getElementById('host-view');
        const chatView = document.getElementById('chat-view');
        const peerIdDisplay = document.getElementById('peer-id-display');
        const qrcodeContainer = document.getElementById('qrcode');
        const connectIdInput = document.getElementById('connect-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const chatLog = document.getElementById('chat-log');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const connectionStatus = document.getElementById('connection-status');
        const fileInput = document.getElementById('file-input');
        const sendFileBtn = document.getElementById('send-file-btn');
        const copyToast = document.getElementById('copy-toast');

        let peer, conn;
        const CHUNK_SIZE = 16384;          // 16 KB per chunk
        const BUFFER_HIGH = 65536;         // pause sending above 64 KB buffered
        const BUFFER_LOW  = 32768;         // resume when back below 32 KB

        // Receiver state
        let rxMeta    = null;   // current incoming file metadata
        let rxBuffer  = [];     // accumulated ArrayBuffers
        let rxSize    = 0;      // bytes received so far
        let rxCard    = null;   // the in-chat card element for current transfer

        // Blob URL store so files can be re-downloaded
        const receivedFiles = [];

        // ── Utilities ──────────────────────────────────────────────

        function generateRandomCode(len = 5) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let r = '';
            for (let i = 0; i < len; i++) r += chars[Math.floor(Math.random() * chars.length)];
            return r;
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function showToast(msg = 'Copied!') {
            copyToast.textContent = msg;
            copyToast.classList.add('show');
            setTimeout(() => copyToast.classList.remove('show'), 1600);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
        }

        function formatBytes(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(2) + ' MB';
        }

        function getFileEmoji(type) {
            if (!type) return '📄';
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📕';
            if (type.includes('zip') || type.includes('archive')) return '📦';
            if (type.includes('text')) return '📝';
            return '📄';
        }

        // ── URL detection ──────────────────────────────────────────

        const URL_RE = /(https?:\/\/[^\s]+)/g;

        function buildMessageHTML(text) {
            const parts = text.split(URL_RE);
            return parts.map((part, i) => {
                if (i % 2 === 1) {
                    const safe = escapeHtml(part);
                    return `<div class="link-card">
                        <a class="link-card-main" href="${safe}" target="_blank" rel="noopener">
                            <span class="link-icon">🔗</span>
                            <span class="link-url">${safe}</span>
                        </a>
                        <button class="link-copy" onclick="event.stopPropagation();copyText('${safe}');showToast('Link copied!')">⎘</button>
                    </div>`;
                }
                return part ? `<span>${escapeHtml(part)}</span>` : '';
            }).join('');
        }

        // ── Message bubbles ────────────────────────────────────────

        function appendMessage(text, direction) {
            const isLong = text.length > 200;
            URL_RE.lastIndex = 0;

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = direction === 'sent' ? 'you' : 'them';

            const bubble = document.createElement('div');
            bubble.className = `msg ${direction}${isLong ? ' large-text' : ''}`;
            bubble.innerHTML = buildMessageHTML(text);

            // Hold-to-copy
            let holdTimer;
            const startHold = () => { holdTimer = setTimeout(() => {
                bubble.classList.add('copying');
                copyText(text);
                setTimeout(() => bubble.classList.remove('copying'), 600);
            }, 500); };
            const cancelHold = () => clearTimeout(holdTimer);
            bubble.addEventListener('mousedown', startHold);
            bubble.addEventListener('mouseup', cancelHold);
            bubble.addEventListener('mouseleave', cancelHold);
            bubble.addEventListener('touchstart', startHold, { passive: true });
            bubble.addEventListener('touchend', cancelHold);

            chatLog.appendChild(label);
            chatLog.appendChild(bubble);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendSysMsg(text) {
            const div = document.createElement('div');
            div.className = 'sys-msg';
            div.textContent = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // ── File cards ─────────────────────────────────────────────
        // Creates an in-chat card immediately; returns the card element.
        // direction: 'sent' | 'received'
        function createFileCard(name, size, mimeType, direction) {
            const card = document.createElement('div');
            card.className = `file-card ${direction}`;
            card.innerHTML = `
                <div class="file-card-top">
                    <span class="file-icon">${getFileEmoji(mimeType)}</span>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(name)}</div>
                        <div class="file-meta">${formatBytes(size)}</div>
                    </div>
                </div>
                <div class="file-card-progress">
                    <div class="file-progress-bar-wrap">
                        <div class="file-progress-bar-fill"></div>
                    </div>
                    <div class="file-progress-label">
                        <span class="prog-status">Starting…</span>
                        <span class="prog-pct">0%</span>
                    </div>
                </div>
                <button class="file-download-btn">↓ Save</button>
                <div class="file-sent-badge">✓ sent</div>
            `;
            chatLog.appendChild(card);
            chatLog.scrollTop = chatLog.scrollHeight;
            return card;
        }

        function updateFileCardProgress(card, received, total) {
            const pct = total > 0 ? Math.round((received / total) * 100) : 0;
            card.querySelector('.file-progress-bar-fill').style.width = pct + '%';
            card.querySelector('.prog-pct').textContent = pct + '%';
            card.querySelector('.prog-status').textContent =
                received < total ? formatBytes(received) + ' / ' + formatBytes(total) : 'Done';
        }

        function finalizeReceivedCard(card, fileIndex) {
            // Hide progress bar, show download button
            card.querySelector('.file-card-progress').style.display = 'none';
            const btn = card.querySelector('.file-download-btn');
            btn.style.display = 'block';
            btn.addEventListener('click', () => {
                const f = receivedFiles[fileIndex];
                const a = document.createElement('a');
                a.href = f.blobUrl;
                a.download = f.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function finalizeSentCard(card) {
            card.querySelector('.file-card-progress').style.display = 'none';
            card.querySelector('.file-sent-badge').style.display = 'block';
        }

        // ── File sending with flow control ─────────────────────────

        function sendFileChunked(file) {
            // Create a card in chat immediately
            const card = createFileCard(file.name, file.size, file.type, 'sent');
            updateFileCardProgress(card, 0, file.size);

            // Send metadata to receiver
            conn.send({ type: 'file-meta', name: file.name, size: file.size, mimeType: file.type });

            let offset = 0;
            const dc = conn.dataChannel; // underlying RTCDataChannel

            // Set the low-water mark so we get notified when safe to continue
            if (dc) dc.bufferedAmountLowThreshold = BUFFER_LOW;

            function sendNext() {
                if (offset >= file.size) {
                    finalizeSentCard(card);
                    return;
                }

                // Pause if the send buffer is too full
                if (dc && dc.bufferedAmount > BUFFER_HIGH) {
                    dc.addEventListener('bufferedamountlow', function resume() {
                        dc.removeEventListener('bufferedamountlow', resume);
                        sendNext();
                    });
                    return;
                }

                const slice = file.slice(offset, offset + CHUNK_SIZE);
                slice.arrayBuffer().then(buf => {
                    conn.send(buf);
                    offset += buf.byteLength;
                    updateFileCardProgress(card, offset, file.size);
                    // Yield to the event loop before next chunk
                    setTimeout(sendNext, 0);
                });
            }

            sendNext();
        }

        // ── PeerJS setup ───────────────────────────────────────────

        const peerId = generateRandomCode();
        peer = new Peer(peerId);

        peer.on('open', (id) => {
            const params = new URLSearchParams(window.location.search);
            const connectTo = params.get('connect');
            if (connectTo) {
                connectIdInput.value = connectTo;
                connectToPeer(connectTo);
            }
            showView('host-view');
            peerIdDisplay.textContent = id.toUpperCase();
            const shareUrl = `${window.location.href.split('?')[0]}?connect=${id}`;
            new QRCode(qrcodeContainer, { text: shareUrl, width: 120, height: 120, colorDark: '#000', colorLight: '#fff' });
        });

        peer.on('connection', (connection) => { conn = connection; setupConnectionEvents(); });
        peer.on('error', (err) => appendSysMsg('⚠ ' + err));

        // ── UI events ──────────────────────────────────────────────

        peerIdDisplay.addEventListener('click', () => {
            copyText(peerIdDisplay.textContent.toLowerCase());
            showToast('Code copied!');
        });

        connectBtn.addEventListener('click', () => {
            const id = connectIdInput.value.trim().toLowerCase();
            if (id) connectToPeer(id);
        });

        connectIdInput.addEventListener('keyup', e => { if (e.key === 'Enter') connectBtn.click(); });

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = '44px';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        sendFileBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file) { showToast('Pick a file first'); return; }
            sendFileChunked(file);
            fileInput.value = '';
        });

        // ── Core logic ─────────────────────────────────────────────

        function connectToPeer(targetId) {
            conn = peer.connect(targetId);
            setupConnectionEvents();
        }

        function setupConnectionEvents() {
            conn.on('open', () => {
                showView('chat-view');
                connectionStatus.textContent = `peer: ${conn.peer}`;
                appendSysMsg('🔗 Connection established');
            });

            conn.on('data', (data) => {
                // ── Detect a binary chunk ──────────────────────────────
                // PeerJS (binary/msgpack mode) sends ArrayBuffer as Uint8Array on arrival.
                // We must handle both ArrayBuffer and any ArrayBufferView (Uint8Array etc.)
                const isBinary = (data instanceof ArrayBuffer) ||
                                 (ArrayBuffer.isView(data) && !(data instanceof DataView));

                if (isBinary) {
                    // Normalise to a plain ArrayBuffer regardless of what PeerJS hands us
                    const buf = data instanceof ArrayBuffer
                        ? data
                        : data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength);

                    rxBuffer.push(buf);
                    rxSize += buf.byteLength;

                    if (rxCard) updateFileCardProgress(rxCard, rxSize, rxMeta.size);

                    if (rxSize >= rxMeta.size) {
                        // Transfer complete — assemble blob
                        const blob = new Blob(rxBuffer, { type: rxMeta.mimeType });
                        const blobUrl = URL.createObjectURL(blob);
                        const idx = receivedFiles.length;
                        receivedFiles.push({ name: rxMeta.name, size: rxMeta.size, type: rxMeta.mimeType, blobUrl });

                        if (rxCard) finalizeReceivedCard(rxCard, idx);

                        // Reset state
                        rxMeta = null; rxBuffer = []; rxSize = 0; rxCard = null;
                    }

                } else if (data && typeof data === 'object' && data.type === 'file-meta') {
                    // ── Incoming file metadata: create card right away ──
                    rxMeta   = data;
                    rxBuffer = [];
                    rxSize   = 0;
                    rxCard   = createFileCard(data.name, data.size, data.mimeType, 'received');
                    updateFileCardProgress(rxCard, 0, data.size);

                } else if (typeof data === 'string') {
                    appendMessage(data, 'received');
                }
            });

            conn.on('close', () => appendSysMsg('⚠ Connection closed'));
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !conn) return;
            conn.send(msg);
            appendMessage(msg, 'sent');
            messageInput.value = '';
            messageInput.style.height = '44px';
        }

        function showView(viewId) {
            hostView.style.display = 'none';
            chatView.style.display = 'none';
            document.getElementById(viewId).style.display = viewId === 'chat-view' ? 'flex' : 'block';
        }
    </script>


</body>
